name: Update TikTok follower count

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and update TikTok count
        run: python3 scripts/fetch_tiktok.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "No changes to commit."
          else
            git add index.html
            git commit -m "chore: update TikTok follower count"
            git push
          fi
